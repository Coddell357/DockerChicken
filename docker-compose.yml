services:
  chick-db-service:
    build:
      context: .
      dockerfile: ./ChickDB/Dockerfile
    container_name: chick-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password1!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
      - "1400:1433"  
    volumes:
      - db_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - chick-network

  mvc-service:
      build:
        context: .               
        dockerfile: ./ChickMVC/Dockerfile  
      container_name: mvc-chick-service-magic
      environment:
        - SQL_CONNECTION_STRING=Server=chick-db;Database=Farm;Trusted_Connection=false;MultipleActiveResultSets=true;Encrypt=false;user id=sa;password=Password1!
        - ASPNETCORE_URLS=http://0.0.0.0:8080   # <-- FORCES C# TO LISTEN ON 8080 INTERNALLY
      ports:
        - "80:8080"                             # <-- Droplet port 80 routes to container 8080
      depends_on:
        - chick-db-service
      networks:
        - chick-network 

  api-service:
    build:
      context: .
      dockerfile: ./ChickenAPI/Dockerfile
    container_name: api-chick-service
    environment:
      - SQL_CONNECTION_STRING=Server=chick-db;Database=Farm;Trusted_Connection=false;MultipleActiveResultSets=true;Encrypt=false;user id=sa;password=Password1!
      - ASPNETCORE_URLS=http://0.0.0.0:8080  # <-- FORCES C# TO LISTEN ON 8080 INTERNALLY
    ports:
      - "8080:8080"                           # <-- Droplet port 8080 routes to container 8080
    depends_on:
      - chick-db-service
    networks:
      - chick-network

networks:
  chick-network:
    driver: bridge

volumes:
  db_data: